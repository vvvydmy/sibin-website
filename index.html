<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Posiadłość</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: black;
    color: white;
}

/* FULL SCREEN HERO */
.hero {
    height: 100vh; /* 🔥 CAŁY EKRAN */
    background-image: url("zdjdom.png");
    background-size: cover;
    background-position: center;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

/* CZARNY GRADIENT */
.hero::after {
    content: "";
    position: absolute;
    inset: 0;

    background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.2) 0%,
        rgba(0,0,0,0.7) 60%,
        rgba(0,0,0,1) 100%
    );
}

/* TEKST */
.hero-content {
    position: relative;
    z-index: 2;
    max-width: 800px;
    padding: 20px;
}

.hero h1 {
    font-size: 42px;
    font-weight: 300;
    letter-spacing: 2px;
    text-transform: uppercase;
}

.hero p {
    font-size: 20px;
    margin: 10px 0;
}

.phone {
    color: white;
    text-decoration: none;
    font-weight: bold;
}

.phone:hover {
    text-decoration: underline;
}

/* CONTENT BELOW */
.content {
    padding: 40px;
    text-align: center;
    background: black;
}

.videos {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
}

.videos iframe {
    width: 320px;
    height: 200px;
    border-radius: 10px;
    border: none;
}
</style>
</head>

<body>

<div class="hero">
    <div class="hero-content">
        <h1>Posiadłość dostępem do wody</h1>

        <p>Cena: 9.999.999,- PLN</p>

        <p>
            Kontakt:
            <a class="phone" href="tel:+48609113055">
                +48 609 113 055
            </a>
        </p>
    </div>
</div>

<div class="content">
    <h2>Filmy</h2>

    <div class="videos">
        <iframe src="https://www.youtube.com/embed/8mmcE5cJbPk" allowfullscreen></iframe>
        <iframe src="https://www.youtube.com/embed/SXrAVw8Vk7g" allowfullscreen></iframe>
        <iframe src="https://www.youtube.com/embed/-JSieEDJieE" allowfullscreen></iframe>
    </div>
</div>

</body>
</html>

</body>
</html>
