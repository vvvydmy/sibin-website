<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sibin</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: white;
}

/* HERO */
.hero {
    height: 70vh;
    background-image: url("zdjdom.png");
    background-size: cover;
    background-position: center;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: white;
}

/* gradient (czarny) */
.hero::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.2) 0%,
        rgba(0,0,0,0.85) 100%
    );
}

/* tekst na hero */
.hero-content {
    position: relative;
    z-index: 2;
    padding: 20px;
}

.hero-content h1 {
    font-size: 36px;
    margin-bottom: 15px;
}

.hero-content p {
    font-size: 18px;
    margin: 5px 0;
}

.hero-content a {
    color: white;
    text-decoration: none;
    font-weight: bold;
}

/* content */
.content {
    padding: 40px;
    text-align: center;
}

.videos {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
}

.videos iframe {
    width: 320px;
    height: 200px;
    border: none;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="hero">
    <div class="hero-content">
        <h1>Posiadłość z dostępem do wody</h1>
        <p>Cena: 9.999.999,- PLN</p>
        <p>
            Kontakt:
            <a href="tel:+48609113055">+48 609 113 055</a>
        </p>
    </div>
</div>

<div class="content">
    <h1>Moje filmy</h1>

    <div class="videos">

        <iframe src="https://www.youtube.com/embed/8mmcE5cJbPk" allowfullscreen></iframe>

        <iframe src="https://www.youtube.com/embed/SXrAVw8Vk7g" allowfullscreen></iframe>

        <iframe src="https://www.youtube.com/embed/-JSieEDJieE" allowfullscreen></iframe>

    </div>
</div>

</body>
</html>
