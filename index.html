<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strona</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: white;
}

/* HERO - góra ze zdjęciem */
.hero {
    height: 70vh;
    background-image: url("zdjdom.png"); /* TWOJE ZDJĘCIE */
    background-size: cover;
    background-position: center;
    position: relative;
}

/* Gradient fade do białego */
.hero::after {
    content: "";
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background: linear-gradient(
        to bottom,
        rgba(0,0,0,0) 40%,
        rgba(255,255,255,1) 100%
    );
}

/* Content */
.content {
    padding: 40px;
    text-align: center;
}

.videos {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
}

.video {
    width: 320px;
}

iframe {
    width: 100%;
    height: 200px;
    border-radius: 10px;
    border: none;
}
</style>
</head>

<body>

<div class="hero"></div>

<div class="content">
    <h1>Moje filmy</h1>

    <div class="videos">

       
<div class="videos">

  <iframe src="https://www.youtube.com/embed/8mmcE5cJbPk" allowfullscreen></iframe>

  <iframe src="https://www.youtube.com/embed/SXrAVw8Vk7g" allowfullscreen></iframe>

  <iframe src="https://www.youtube.com/embed/-JSieEDJieE" allowfullscreen></iframe>

</div>

<style>
.videos {
  display: flex;
  gap: 20px;
  justify-content: center;
  flex-wrap: wrap;
}

.videos iframe {
  width: 320px;
  height: 200px;
  border: none;
  border-radius: 10px;
}
</style>


    </div>
</div>

</body>
</html>
