<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Posiadłość</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: white;
}

/* HERO */
.hero {
    height: 70vh;
    background-image: url("zdjdom.png");
    background-size: cover;
    background-position: center;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: white;
}

/* CZARNY GRADIENT */
.hero::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.3) 0%,
        rgba(0,0,0,0.8) 100%
    );
}

/* TREŚĆ NA GÓRZE */
.hero-content {
    position: relative;
    z-index: 2;
    max-width: 800px;
    padding: 20px;
}

.hero h1 {
    font-size: 36px;
    margin-bottom: 15px;
}

.hero p {
    font-size: 20px;
    margin: 5px 0;
}

.phone {
    color: white;
    text-decoration: none;
    font-weight: bold;
}

.phone:hover {
    text-decoration: underline;
}

/* SEKCJA FILMÓW */
.content {
    padding: 40px;
    text-align: center;
}

.videos {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
}

.videos iframe {
    width: 320px;
    height: 200px;
    border: none;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="hero">
    <div class="hero-content">
        <h1>Posiadłość dostępem do wody</h1>

        <p>Cena: 9.999.999,- PLN</p>

        <p>
            Kontakt:
            <a class="phone" href="tel:+48609113055">
                +48 609 113 055
            </a>
        </p>
    </div>
</div>

<div class="content">
    <h2>Filmy</h2>

    <div class="videos">

        <iframe src="https://www.youtube.com/embed/8mmcE5cJbPk" allowfullscreen></iframe>

        <iframe src="https://www.youtube.com/embed/SXrAVw8Vk7g" allowfullscreen></iframe>

        <iframe src="https://www.youtube.com/embed/-JSieEDJieE" allowfullscreen></iframe>

    </div>
</div>

</body>
</html>
