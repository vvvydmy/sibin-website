<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Posiadłość</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: black;
    color: white;
}

/* HERO */
.hero {
    height: 100vh;
    background-image: url("zdjdom.png");
    background-size: cover;
    background-position: center;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* GRADIENT OD DOŁU */
.hero::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.2) 0%,
        rgba(0,0,0,0.4) 40%,
        rgba(0,0,0,0.95) 100%
    );
}

/* TEKST */
.hero-content {
    position: relative;
    z-index: 2;
    text-align: center;
    max-width: 900px;
}

.hero h1 {
    font-size: 42px;
    font-weight: 300;
    letter-spacing: 2px;
    margin-bottom: 10px;
    text-transform: uppercase;
}

.hero p {
    font-size: 20px;
    margin: 6px 0;
}

.phone {
    color: white;
    text-decoration: none;
    font-weight: bold;
}

/* WIDEO NA ZDJĘCIU */
.videos {
    position: relative;
    z-index: 2;
    margin-top: 30px;
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
}

.videos iframe {
    width: 320px;
    height: 200px;
    border: none;
    border-radius: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
</style>
</head>

<body>

<div class="hero">

    <div class="hero-content">
        <h1>Posiadłość dostępem do wody</h1>

        <p>Cena: 9.999.999,- PLN</p>

        <p>
            Kontakt:
            <a class="phone" href="tel:+48609113055">
                +48 609 113 055
            </a>
        </p>
    </div>

    <!-- FILMY NA TLE ZDJĘCIA -->
    <div class="videos">
        <iframe src="https://www.youtube.com/embed/8mmcE5cJbPk" allowfullscreen></iframe>
        <iframe src="https://www.youtube.com/embed/SXrAVw8Vk7g" allowfullscreen></iframe>
        <iframe src="https://www.youtube.com/embed/-JSieEDJieE" allowfullscreen></iframe>
    </div>

</div>

</body>
</html>
</body>
</html>
