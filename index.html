<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sibin</title>

<style>
body {
    margin: 0;
    font-family: Inter, sans-serif;
    background: black;
    color: white;
}

/* CAŁA SEKCJA */
.hero {
    min-height: 100vh;
    background-image: url("zdjdom.png");
    background-size: cover;
    background-position: center;
    position: relative;

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    text-align: center;
}

/* GRADIENT OD DOŁU */
.hero::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.2) 0%,
        rgba(0,0,0,0.6) 50%,
        rgba(0,0,0,0.95) 100%
    );
}

/* wszystko nad gradientem */
.content {
    position: relative;
    z-index: 2;
    max-width: 1000px;
}

/* TEKST */
h1 {
    font-size: 42px;
    font-weight: 300;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 15px;
}

p {
    font-size: 20px;
    margin: 8px 0;
}

.phone {
    color: white;
    text-decoration: none;
    font-weight: bold;
}

/* FILMY POD TEKSTEM */
.videos {
    margin-top: 40px;
    display: flex;
    flex-direction: column; /* 🔥 jedno pod drugim */
    gap: 20px;
    align-items: center;
}

.videos iframe {
    width: 80vw;
    max-width: 700px;
    height: 380px;
    border: none;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
}
</style>
</head>

<body>

<div class="hero">

    <div class="content">

        <h1>Posiadłość dostępem do wody</h1>

        <p>Cena: 9.999.999,- PLN</p>

        <p>
            Kontakt:
            <a class="phone" href="tel:+48609113055">
                +48 609 113 055
            </a>
        </p>

        <div class="videos">

            <iframe src="https://www.youtube.com/embed/8mmcE5cJbPk" allowfullscreen></iframe>

            <iframe src="https://www.youtube.com/embed/SXrAVw8Vk7g" allowfullscreen></iframe>

            <iframe src="https://www.youtube.com/embed/-JSieEDJieE" allowfullscreen></iframe>

        </div>

    </div>

</div>

</body>
</html>
